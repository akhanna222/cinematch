# Local dev infra for the CineMatch backend (PRD §6.1).
# Brings up Postgres + Redis + the API. `docker compose up --build`.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cinematch
      POSTGRES_PASSWORD: cinematch
      POSTGRES_DB: cinematch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinematch"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CINEMATCH_DATABASE_URL: postgresql+psycopg://cinematch:cinematch@db:5432/cinematch
      CINEMATCH_REDIS_URL: redis://redis:6379/0
      CINEMATCH_JWT_SECRET: dev-secret-change-me
    ports:
      - "8000:8000"

volumes:
  pgdata:
